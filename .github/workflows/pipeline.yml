name: Gun Channel Pipeline

on:
  schedule:
    # ─── Расписание оптимизировано под US аудиторию (военные / gun culture) ───
    #
    # Лучшее время по данным YouTube Shorts алгоритма (US Eastern Time):
    #   - Вторник  12:00 EST → 17:00 UTC  (обед, огромный трафик Shorts)
    #   - Четверг  18:00 EST → 23:00 UTC  (вечер четверга — пике перед выходными)
    #   - Суббота  09:00 EST → 14:00 UTC  (утро выходного — gun culture смотрит контент)
    #
    # Логика: публикуем за 1-2 часа ДО пика просмотров, чтобы алгоритм
    # успел раздать видео до массового прайм-тайма.

    # Вторник 12:00 EST (17:00 UTC) — обеденный всплеск
    - cron: "0 17 * * 2"
    # Четверг 18:00 EST (23:00 UTC) — вечер четверга, старт выходных
    - cron: "0 23 * * 4"
    # Суббота 09:00 EST (14:00 UTC) — утро выходного дня
    - cron: "0 14 * * 6"


jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps (ffmpeg, yt-dlp)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install yt-dlp --quiet

      - name: Install Python deps
        run: pip install -r requirements.txt --quiet

      - name: Restore published history
        uses: actions/cache@v4
        with:
          path: /tmp/gun_channel/published.json
          key: published-history-${{ github.run_number }}
          restore-keys: published-history-

      - name: Run pipeline
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY:           ${{ secrets.NVIDIA_API_KEY }}
          YOUTUBE_API_KEY:          ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          YOUTUBE_TOKEN_JSON:       ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GDRIVE_FOLDER_ID:         ${{ secrets.GDRIVE_FOLDER_ID }}
          REDDIT_CLIENT_ID:         ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:     ${{ secrets.REDDIT_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_NUMBER:        ${{ github.run_number }}
          DRY_RUN:                  ${{ inputs.dry_run }}
        run: python main.py

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shorts-output-${{ github.run_number }}
          path: /tmp/gun_channel/output/
          retention-days: 7

      - name: Save published history
        uses: actions/cache@v4
        if: always()
        with:
          path: /tmp/gun_channel/published.json
          key: published-history-${{ github.run_number }}
