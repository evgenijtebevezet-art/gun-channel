name: Gun Channel Pipeline

on:
  schedule:
    # Пн, Ср, Пт в 11:00 UTC (7am EST)
    - cron: "0 11 * * 1,3,5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no upload)"
        type: boolean
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps (ffmpeg, yt-dlp)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install yt-dlp --quiet

      - name: Install Python deps
        run: pip install -r requirements.txt --quiet

      - name: Restore published history
        uses: actions/cache@v4
        with:
          path: /tmp/gun_channel/published.json
          key: published-history-${{ github.run_number }}
          restore-keys: published-history-

      - name: Run pipeline
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY:           ${{ secrets.NVIDIA_API_KEY }}
          YOUTUBE_API_KEY:          ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          YOUTUBE_TOKEN_JSON:       ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GDRIVE_FOLDER_ID:         ${{ secrets.GDRIVE_FOLDER_ID }}
          REDDIT_CLIENT_ID:         ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:     ${{ secrets.REDDIT_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_NUMBER:        ${{ github.run_number }}
          DRY_RUN:                  ${{ inputs.dry_run }}
        run: python main.py

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shorts-output-${{ github.run_number }}
          path: /tmp/gun_channel/output/
          retention-days: 7

      - name: Save published history
        uses: actions/cache@v4
        if: always()
        with:
          path: /tmp/gun_channel/published.json
          key: published-history-${{ github.run_number }}
